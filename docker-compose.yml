services:
  mongodb:
    image: mongo:7
    container_name: chat-mongodb-local
    ports:
      - "27017:27017"
    volumes:
      - mongodb_local_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: chat-redis-local
    command: ["redis-server", "--requirepass", "chatredis"]
    ports:
      - "6379:6379"
    volumes:
      - redis_local_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "chatredis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mongodb_local_data:
  redis_local_data:

